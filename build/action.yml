name: Build Armedia Docker Containers
inputs:
  local-registry:
    description: "The Docker registry to use for local development"
    required: false
    type: string
    default: ""

  local-publish:
    description: "Whether to publish the container to the local registry"
    required: false
    type: boolean
    default: false

  matrix-revision:
    description: "The matrix revision being built"
    required: false
    type: string
    default: "*"

  matrix-variant:
    description: "The matrix variant being built"
    required: false
    type: string
    default: "main"

  revision:
    description: "The revision number to use for construction (computed from the Dockerfile if not provided)"
    required: false
    type: string

  portal:
    description: "The FOIA Portal version to use for construction (computed from the Dockerfile if not provided)"
    required: false
    type: string

  maximize-build-space:
    description: "Whether or not to maximize the build space by removing unnecessary tools & libraries"
    required: false
    type: boolean
    default: false

  aws-org-id:
    description: "The AWS Organization ID"
    required: true
    type: string

  aws-region:
    description: "The AWS region"
    required: true
    type: string

  aws-access-key-id:
    description: "The AWS Access Key ID"
    required: true
    type: string

  aws-secret-access-key:
    description: "The AWS Secret Access Key"
    required: true
    type: string

  alf-quay-io-username:
    description: "The username to authenticate to Alfresco's Quay.io repository"
    required: false
    type: string

  alf-quay-io-password:
    description: "The password to authenticate to Alfresco's Quay.io repository"
    required: false
    type: string

  chainguard-username:
    description: "The username to authenticate to the Chainguard repository"
    required: false
    type: string

  chainguard-password:
    description: "The password to authenticate to the Chainguard repository"
    required: false
    type: string

  curl-encryption-key:
    description: "The encryption key with which to decrypt the username and password for general cURL downloads in the containers"
    required: false
    type: string
    default: ""

  curl-username:
    description: "The (optionally-encrypted with curl-encryption-key) username to authenticate with for general cURL downloads in the container build"
    required: false
    type: string
    default: ""

  curl-password:
    description: "The encrypted (using curl-encryption-key) password to authenticate with for general cURL downloads in the container build"
    required: false
    type: string
    default: ""

  mvn-get-encryption-key:
    description: "The encryption key with which to decrypt the username and password for general Maven downloads in the containers"
    required: false
    type: string
    default: ""

  mvn-get-username:
    description: "The (optionally-encrypted with mvn-get-encryption-key) username to authenticate with for general Maven downloads in the container build"
    required: false
    type: string
    default: ""

  mvn-get-password:
    description: "The encrypted (using mvn-get-encryption-key) password to authenticate with for general Maven downloads in the container build"
    required: false
    type: string
    default: ""

  scanner-image:
    description: "The contiainer image to use for vulnerability and compliance scanning"
    required: false
    type: string

  reports-bucket:
    description: "The bucket into which to upload the STIG Compliance and Vulnerability reports (defaults to 'arkcase-container-scan-results')"
    required: false
    type: string

  compliance-scan:
    description: "Whether or not to scan for STIG compliance on the build"
    required: false
    type: boolean
    # Start of false, for testing...
    default: true

  compliance-required:
    description: "Whether or not to require full STIG compliance to approve the build (default false)"
    required: false
    type: boolean
    default: false

  vulnerabilities-scan:
    description: "Whether or not to scan for vulnerabilities on the build"
    required: false
    type: boolean
    default: true

  vulnerabilities-required:
    description: "Whether or not to require no CRIT or HIGH vulnerabilities to approve the build (default false)"
    required: false
    type: boolean
    default: false

  devel-keep-days:
    description: "The number of days to keep devel- builds for"
    required: false
    type: number
    default: 30

  snapshot-keep-days:
    description: "The number of days to keep SNAPSHOT builds for"
    required: false
    type: number
    default: 30

runs:
  using: composite
  steps:
    - id: initialize
      name: Initialize the Environment
      env:
        MATRIX_REVISION: ${{ inputs.matrix-revision }}
        MATRIX_VARIANT: ${{ inputs.matrix-variant }}
        PARAM_REVISION: ${{ inputs.revision }}
        PARAM_PORTAL: ${{ inputs.portal }}
      run: |
        "${GITHUB_ACTION_PATH}/initialize.sh"

    - name: Docker Login to Alfresco Quay.IO (if applicable)
      env:
        REGISTRY: "quay.io"
        USERNAME: ${{ inputs.alf-quay-io-username }}
        PASSWORD: ${{ inputs.alf-quay-io-password }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (env.USERNAME != '') && (env.PASSWORD != '') }}
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.USERNAME }}
        password: ${{ env.PASSWORD }}

    - name: Docker Login to Chainguard (if applicable)
      env:
        REGISTRY: "cgr.dev"
        USERNAME: ${{ inputs.chainguard-username }}
        PASSWORD: ${{ inputs.chainguard-password }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (env.USERNAME != '') && (env.PASSWORD != '') }}
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.USERNAME }}
        password: ${{ env.PASSWORD }}

    - name: Configure AWS credentials
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        mask-aws-account-id: true

      # The AWS login needs to happen before the build b/c the
      # ECR_REGISTRY_PRIVATE value is computed here
    - id: login-ecr-private
      name: Login to Amazon ECR (Private)
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      uses: aws-actions/amazon-ecr-login@v2

      # The AWS login needs to happen before the build b/c the
      # ECR_REGISTRY_PUBLIC value is computed here
    - id: login-ecr-public
      name: Login to Amazon ECR (Public)
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registry-type: public

    - name: Identify the build's characteristics (visibility, version number, etc)
      env:
        ECR_REGISTRY_PRIVATE: ${{ steps.login-ecr-private.outputs.registry }}
        ECR_REGISTRY_PUBLIC: ${{ steps.login-ecr-public.outputs.registry }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      run: |
        "${GITHUB_ACTION_PATH}/analyze.sh"

    - name: Show Current Build Space
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
        MAXIMIZE_BUILD_SPACE: ${{ inputs.maximize-build-space }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (env.MAXIMIZE_BUILD_SPACE == 'true') }}
      run: df -kh

    - name: Clear Out All Possible Disk Space
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
        MAXIMIZE_BUILD_SPACE: ${{ inputs.maximize-build-space }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (env.MAXIMIZE_BUILD_SPACE == 'true') }}
      uses: jlumbroso/free-disk-space@main

    - name: Show Maximized Build Space
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
        MAXIMIZE_BUILD_SPACE: ${{ inputs.maximize-build-space }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (env.MAXIMIZE_BUILD_SPACE == 'true') }}
      run: df -kh

    - name: Build the Docker image
      env:
        MATRIX_REVISION: ${{ input.matrix-revision }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
        ECR_REGISTRY_PRIVATE: ${{ steps.login-ecr-private.outputs.registry }}
        ECR_REGISTRY_PUBLIC: ${{ steps.login-ecr-public.outputs.registry }}
        ECR_AWS_REGION: ${{ inputs.aws-region }}
        ECR_AWS_ACCESS_KEY: ${{ inputs.aws-access-key-id }}
        ECR_AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        CURL_ENCRYPTION_KEY: ${{ inputs.curl-encryption-key }}
        CURL_USERNAME: ${{ inputs.curl-username }}
        CURL_PASSWORD: ${{ inputs.curl-password }}
        MVN_GET_ENCRYPTION_KEY: ${{ inputs.mvn-get-encryption-key }}
        MVN_GET_USERNAME: ${{ inputs.mvn-get-username }}
        MVN_GET_PASSWORD: ${{ inputs.mvn-get-password }}
      run: |
       "${GITHUB_ACTION_PATH}/build.sh"

    - name: Clear out the results directory
      env:
        SCAN_COMP: ${{ inputs.compliance-scan }}
        SCAN_VULN: ${{ inputs.vulnerabilities-scan }}
      if: ${{ (env.SCAN_COMP == 'true') || (env.SCAN_VULN == 'true') }}
      run:
        [ -d "${SCAN_DIR}" ] && rm -rf "${SCAN_DIR}"
        mkdir -p "${SCAN_DIR}"

    - name: Scan for STIG compliance
      if: ${{ env.SCAN_COMP == 'true' }}
      env:
        SCAN_COMP: ${{ inputs.compliance-scan }}
        SCAN_COMP_REQUIRED: ${{ inputs.compliance-required }}
        SCAN_TYPE: "compliance"
        SCANNER_IMAGE: ${{ inputs.scanner-image }}
      run: |
        "${GITHUB_ACTION_PATH}/run-scan.sh"
      continue-on-error: ${{ env.SCAN_COMP_REQUIRED != 'true' }}

    - name: Scan for vulnerabilities
      env:
        SCAN_VULN: ${{ inputs.vulnerabilities-scan }}
        SCAN_VULN_REQUIRED: ${{ inputs.vulnerabilities-required }}
        SCAN_TYPE: "vulnerabilities"
        SCANNER_IMAGE: ${{ inputs.scanner-image }}
      if: ${{ env.SCAN_VULN == 'true' }}
      run: |
        "${GITHUB_ACTION_PATH}/run-scan.sh"
      continue-on-error: ${{ env.SCAN_VULN_REQUIRED != 'true' }}

    - name: Upload the STIG compliance report to the GitHub Artifacts tab
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (hashFiles(env.COMP_REPORT_XML_SOURCE) != '') }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.COMP_REPORT_BASE }}
        path: ${{ env.COMP_REPORT_PATTERN }}
        retention-days: ${{ env.SCAN_REPORT_RETENTION_DAYS }}

    - name: Upload the STIG compliance report to the GitHub Security tab
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (hashFiles(env.COMP_REPORT_XML_SOURCE) != '') }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ env.COMP_REPORT_SARIF_SOURCE }}
        category: stig-compliance
      continue-on-error: true

    - name: Upload the STIG compliance report to S3
      env:
        REPORTS_BUCKET: ${{ inputs.reports-bucket }}
        TYPE: "compliance"
        PATTERN: ${{ env.COMP_REPORT_PATTERN }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (hashFiles(env.COMP_REPORT_XML_SOURCE) != '') }}
      run: |
        "${GITHUB_ACTION_PATH}/upload-reports.sh" 

    - name: Upload the vulnerabilities reports to the GitHub artifacts tab
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (hashFiles(env.VULN_REPORT_JSON_SOURCE) != '') }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.VULN_REPORT_BASE }}
        path: ${{ env.VULN_REPORT_PATTERN }}
        retention-days: ${{ env.SCAN_REPORT_RETENTION_DAYS }}

    - name: Upload the vulnerabilities report to the GitHub Security tab
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (hashFiles(env.VULN_REPORT_SARIF_SOURCE) != '') }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ env.VULN_REPORT_SARIF_SOURCE }}
        category: vulnerabilities
      continue-on-error: true

    - name: Upload the vulnerabilities report to S3
      env:
        REPORTS_BUCKET: ${{ inputs.reports-bucket }}
        TYPE: "vulnerabilities"
        PATTERN: ${{ env.VULN_REPORT_PATTERN }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ (env.LOCAL_REGISTRY == '') && (hashFiles(env.VULN_REPORT_JSON_SOURCE) != '') }}
      run: |
        "${GITHUB_ACTION_PATH}/upload-reports.sh" 

    - name: Rebuild adding the scan results
      if: ${{ (hashFiles(env.VULN_REPORT_JSON_SOURCE) != '') || (hashFiles(env.COMP_REPORT_XML_SOURCE) != '') }}
      run: |
        "${GITHUB_ACTION_PATH}/rebuild-with-scans.sh"

    - name: Push the new tags
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      run: |
        # We split this up b/c if this build doesn't pass the security scan,
        # it won't be uploaded or tagged (eventually :D)
        "${GITHUB_ACTION_PATH}/push-tags.sh"

    - name: Create the ECR Repositories (if applicable)
      env:
        IMAGE_URI: ${{ inputs.image-uri }}
        AWS_REGION: ${{ inputs.aws-region }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      run: |
        "${GITHUB_ACTION_PATH}/create-repository.sh"

    - name: Create Access Permissions
      env:
        IMAGE_URI: ${{ inputs.image-uri }}
        AWS_ORG_ID: ${{ inputs.aws-org-id }}
        AWS_REGION: ${{ inputs.aws-region }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      run: |
        "${GITHUB_ACTION_PATH}/permissions.sh"

    - name: Create Lifecycle Policy
      env:
        IMAGE_URI: ${{ inputs.image-uri }}
        AWS_REGION: ${{ inputs.aws-region }}
        SNAPSHOT_KEEP_DAYS: ${{ inputs.snapshot-keep-days }}
        DEVEL_KEEP_DAYS: ${{ inputs.devel-keep-days }}
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
      if: ${{ env.LOCAL_REGISTRY == '' }}
      run: |
        "${GITHUB_ACTION_PATH}/lifecycle-policy.sh"

    - name: Publish the Docker Image (and all its tags)
      env:
        LOCAL_REGISTRY: ${{ inputs.local-registry }}
        LOCAL_PUBLISH: ${{ inputs.local-publish }}
      if: ${{ (env.LOCAL_REGISTRY == '') || (env.LOCAL_PUBLISH == 'true') }}
      run: |
        "${GITHUB_ACTION_PATH}/publish.sh"

    - name: Cleanup
      run: |
        "${GITHUB_ACTION_PATH}/cleanup.sh"
